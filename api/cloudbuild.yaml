steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/tradeson/tradeson-api:$COMMIT_SHA', '-f', 'api/Dockerfile', 'api/']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/tradeson/tradeson-api:$COMMIT_SHA']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'tradeson-api'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/tradeson/tradeson-api:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--port=8080'
      - '--allow-unauthenticated'
      - '--set-env-vars=NODE_ENV=production'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/tradeson/tradeson-api:$COMMIT_SHA'
