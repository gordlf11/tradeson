steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/tradeson/tradeson-api:$COMMIT_SHA', '-f', 'api/Dockerfile', 'api/']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/tradeson/tradeson-api:$COMMIT_SHA']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'tradeson-api'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/tradeson/tradeson-api:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--port=8080'
      - '--allow-unauthenticated'
      # Attach Cloud SQL instance via Unix socket so the API can talk to PG.
      - '--add-cloudsql-instances=$PROJECT_ID:us-central1:tradeson-db'
      # Non-secret connection metadata.
      - '--set-env-vars=NODE_ENV=production,INSTANCE_CONNECTION_NAME=$PROJECT_ID:us-central1:tradeson-db,DB_USER=postgres,DB_NAME=tradeson_app'
      # Secrets sourced from Secret Manager, never committed to the repo.
      #   DB_PASS            -> tradeson-db-pass
      #   STRIPE_SECRET_KEY  -> tradeson-stripe-secret-key
      # Comma-separated; --set-secrets replaces the full mapping on each
      # deploy, so any new secret binding must be added to this line.
      - '--set-secrets=DB_PASS=tradeson-db-pass:latest,STRIPE_SECRET_KEY=tradeson-stripe-secret-key:latest'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/tradeson/tradeson-api:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
